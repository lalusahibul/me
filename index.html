<!doctype html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <nav class="flex justify-between items-center bg-slate-800 p-4 text-white relative">
        <div class="hidden md:flex items-center">
            <div class="w-16 h-16 flex items-center justify-center">
                <img src="img/logo-ibul.png" alt="Logo">
            </div>
        </div>
        <div class="md:hidden">
            <button id="menu-toggle" class="p-2 focus:outline-none relative">
                <!-- Hamburger Icon -->
                <div id="hamburger" class="w-6 h-6 flex flex-col justify-center items-center space-y-1">
                    <span
                        class="block w-6 h-0.5 bg-white transform transition-transform duration-300 ease-in-out"></span>
                    <span
                        class="block w-6 h-0.5 bg-white transform transition-transform duration-300 ease-in-out"></span>
                    <span
                        class="block w-6 h-0.5 bg-white transform transition-transform duration-300 ease-in-out"></span>
                </div>
            </button>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center">
                <div class="w-14 h-14 flex items-center justify-center">
                    <img src="img/logo-ibul.png" alt="Logo">
                </div>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div id="navigation-menu"
            class="absolute inset-x-0 top-full bg-slate-800 hidden p-4 md:static md:flex md:items-center md:space-x-4 md:bg-transparent md:p-0 shadow-lg md:shadow-none z-50">
            <a href="#"
                class="block py-2 px-4 hover:bg-slate-700 rounded md:inline-block md:p-0 md:hover:bg-transparent md:hover:text-slate-300 transition-colors">Home</a>
            <a href="#"
                class="block py-2 px-4 hover:bg-slate-700 rounded md:inline-block md:p-0 md:hover:bg-transparent md:hover:text-slate-300 transition-colors">About
                Me</a>
            <a href="#"
                class="block py-2 px-4 hover:bg-slate-700 rounded md:inline-block md:p-0 md:hover:bg-transparent md:hover:text-slate-300 transition-colors">Project</a>
            <a href="#"
                class="block py-2 px-4 hover:bg-slate-700 rounded md:inline-block md:p-0 md:hover:bg-transparent md:hover:text-slate-300 transition-colors">Contact</a>
        </div>

        <div class="flex items-center">
            <div class="w-12 h-12 rounded-full bg-slate-600 flex items-center justify-center">
                <img src="img/ibul.webp" alt="Profile" class="rounded-full">
            </div>
        </div>
    </nav>

    <main class="p-4">
        <section class="bg-white shadow rounded-lg p-6 mt-4">
            <h1 class="text-2xl font-bold mb-4">Welcome to My Portfolio</h1>
            <p class="text-slate-500">This is a sample content area. The mobile navigation menu will work properly on
                smaller screens.</p>
        </section>
    </main>
    <!-- Script.js -->
    <script src="js/script.js"></script>
</body>

</html>
